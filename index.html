<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Updates</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e8f0ff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h1 {
            font-size: 40px;
            color: #234b76;
            margin-bottom: 10px;
        }

        p {
            color: #444;
            margin-bottom: 40px;
            font-size: 18px;
        }

        .button-box {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .card {
            width: 280px;
            padding: 30px;
            border-radius: 20px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: block;
        }

        .status {
            background: linear-gradient(135deg, #1dd1a1, #10ac84);
        }

        .timesheet {
            background: linear-gradient(135deg, #ffb84d, #ff9966);
        }

        .card:hover {
            transform: scale(1.07);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Hi, Welcome Back!</h1>
        <p>What do you wanna update?</p>

        <div class="button-box">
            <a href="https://forms.microsoft.com/r/WsaZAZXx88" class="card status">Daily Status Form</a>

            <a href="https://forms.microsoft.com/Pages/ResponsePage.aspx?id=zdgqTVXXRkO0gmfdSzxwdMR2u7nMIXROja5-DuQFNxhUME1LMUtXQUJGUkJMOTRQRUZPWjVVMFFGRy4u"
                class="card timesheet">Daily TimeSheet Form</a>
        </div>
    </div>
</body>

</html>
