<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Updates</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #eef1ff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h1 {
            font-size: 40px;
            color: #3c3f91;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 40px;
            font-size: 18px;
        }

        .button-box {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .card {
            width: 300px;
            height: 300px;
            padding: 40px;
            border-radius: 25px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Lavender Gradient */
        .timesheet {
            background: linear-gradient(135deg, #c8a2ff, #a67eff);
        }

        /* Light Blue Gradient */
        .loginlogout {
            background: linear-gradient(135deg, #9ecbff, #6fa8ff);
        }

        .card:hover {
            transform: scale(1.08);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Hi, Welcome Back!</h1>
        <p>Select what you want to update today</p>

        <div class="button-box">

            <!-- Timesheet -->
            <a href="https://forms.microsoft.com/r/WsaZAZXx88" class="card timesheet">
                Timesheet Form
            </a>

            <!-- Login Logout -->
            <a href="https://forms.microsoft.com/r/J4teFvsHUm" class="card loginlogout">
                Login / Logout Tracker
            </a>

        </div>
    </div>
</body>

</html>
