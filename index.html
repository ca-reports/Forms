<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Updates</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f3f0ff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h1 {
            font-size: 36px;
            color: #3b3b7e;
            margin-bottom: 10px;
            font-weight: bold;
        }

        p {
            color: #555;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .button-box {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        /* Cute Small Cards */
        .card {
            width: 180px;
            height: 120px;
            padding: 15px;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s ease;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }

        /* Gradients */
        .timesheet {
            background: linear-gradient(135deg, #c8a7ff, #9b71ff);
        }

        .loginlogout {
            background: linear-gradient(135deg, #9ed0ff, #6eb8ff);
        }

        .devx {
            background: linear-gradient(135deg, #ff9ecf, #ff6fa5);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Hi, Welcome Back!</h1>
        <p>What do you want to update today?</p>

        <div class="button-box">

            <!-- Timesheet Form -->
            <a href="https://forms.microsoft.com/r/WsaZAZXx88" class="card timesheet">
                Timesheet Form
            </a>

            <!-- Login Logout Tracker -->
            <a href="https://forms.microsoft.com/r/J4teFvsHUm" class="card loginlogout">
                Login / Logout Tracker
            </a>

            <!-- DevX Usage Form -->
            <a href="https://forms.office.com/r/a8L5Xb1Tj1" class="card devx">
                DevX Usage Form
            </a>

        </div>
    </div>
</body>

</html>
