<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms Hub</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #e8f0fe;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            width: 100%;
        }
        h1 {
            color: #1a3c6e;
            margin-bottom: 10px;
            font-size: 32px;
        }
        p {
            color: #1a3c6e;
            margin-bottom: 40px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
        }
        .btn {
            padding: 20px 40px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
        .btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
        .green {
            background-color: #16a34a;
        }
        .orange {
            background-color: #fb923c;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hi, Welcome Back!</h1>
        <p>What do you wanna update?</p>

        <div class="buttons">

            <!-- Left button: Timesheet Form -->
            <a href="https://forms.microsoft.com/r/WsaZAZXx88" class="btn green">
                Timesheet Form
            </a>

            <!-- Right button: Login Logout Tracker -->
            <a href="https://forms.microsoft.com/Pages/ResponsePage.aspx?id=zdgqTVXXRkO0gmfdSzxwdMR2u7nMIXROja5-DuQFNxhUME1LMUtXQUJGUkJMOTRQRUZPWjVVMFFGRy4u" class="btn orange">
                Login Logout Tracker
            </a>

        </div>
    </div>

</body>
</html>
