<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Updates</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f3f0ff; /* very light lavender background */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h1 {
            font-size: 38px;
            color: #3b3b7e;
            margin-bottom: 10px;
            font-weight: bold;
        }

        p {
            color: #555;
            margin-bottom: 35px;
            font-size: 18px;
        }

        .button-box {
            display: flex;
            justify-content: center;
            gap: 35px;
            flex-wrap: wrap;
        }

        .card {
            width: 250px;           /* smaller square */
            height: 180px;          /* makes it a nice rectangle block */
            padding: 25px;
            border-radius: 22px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Lavender Gradient */
        .timesheet {
            background: linear-gradient(135deg, #c8a7ff, #9b71ff);
        }

        /* Light Blue Gradient */
        .loginlogout {
            background: linear-gradient(135deg, #9ed0ff, #6eb8ff);
        }
        /* Pink Gradient */
.devx {
    background: linear-gradient(135deg, #ff9ecf, #ff6fa5);
}

        .card:hover {
            transform: scale(1.06);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Hi, Welcome Back!</h1>
        <p>What do you want to update?</p>

        <div class="button-box">
            <!-- Timesheet Form -->
            <a href="https://forms.microsoft.com/r/WsaZAZXx88" class="card timesheet">
                Timesheet Form
            </a>

            <!-- Login Logout Tracker -->
            <a href="https://forms.microsoft.com/r/J4teFvsHUm" class="card loginlogout">
                Login / Logout Tracker
            </a>
               <!-- DevX Usage Form -->
    <a href="https://forms.office.com/r/a8L5Xb1Tj1" class="card devx">
        DevX Usage Form
    </a>

        </div>
    </div>
</body>

</html>
